stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKERHUB_IMAGE: "andreybolut/prometheus-telegram-bot"

test:
  image: python:3.12-slim
  stage: test
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip/
      - .cache/uv/
  before_script:
    - python -V
    - pip install --upgrade pip uv
    - uv sync --group dev
  needs:
    - lint
  script:
    - uv run python -m compileall src tests examples
    - mkdir -p reports
    - uv run pytest --junitxml=reports/junit.xml
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - reports/
    expire_in: 1 week

lint:
  image: python:3.12-slim
  stage: lint
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip/
      - .cache/uv/
  before_script:
    - python -V
    - pip install --upgrade pip uv
    - uv sync --group dev
  script:
    - uv run ruff check .

docker-publish:
  stage: build
  image: docker:26.1.4
  services:
    - name: docker:26.1.4-dind
      alias: docker
  needs:
    - lint
    - test
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" docker.io --password-stdin
  script:
    - docker pull "$DOCKERHUB_IMAGE:latest" || true
    - docker build --cache-from "$DOCKERHUB_IMAGE:latest" -t "$DOCKERHUB_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$DOCKERHUB_IMAGE:$CI_COMMIT_SHA"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$DOCKERHUB_IMAGE:$CI_COMMIT_SHA" "$DOCKERHUB_IMAGE:$CI_COMMIT_TAG"
        docker push "$DOCKERHUB_IMAGE:$CI_COMMIT_TAG"
      fi
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$DOCKERHUB_IMAGE:$CI_COMMIT_SHA" "$DOCKERHUB_IMAGE:latest"
        docker push "$DOCKERHUB_IMAGE:latest"
      fi
  rules:
    - if: '$CI_COMMIT_TAG'
